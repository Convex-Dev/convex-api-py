name: 📦 Publish to PyPI

# Trusted Publishing (OIDC) — no PyPI token/secret required.
# Fires on version tags (e.g. v0.3.2). `bumpversion` already tags releases as `v{version}`.
# Inert until a trusted publisher is configured on PyPI — see .github/PUBLISHING.md.
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: 🏗️ Build distributions
    runs-on: ubuntu-latest
    steps:
      - name: 🛒 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 🧰 Install build tooling
        run: python -m pip install --upgrade build

      - name: 🏗️ Build sdist and wheel
        run: python -m build

      - name: ⬆️ Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: 🚀 Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/convex-api-py/
    permissions:
      id-token: write  # Required for PyPI trusted publishing (OIDC)
    steps:
      - name: ⬇️ Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: 🚀 Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
